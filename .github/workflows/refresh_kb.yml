name: Refresh Knowledge Base

on:
  schedule:
    - cron: "0 2 * * 1" # every Monday at 2am UTC
  workflow_dispatch: # also allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Build knowledge base
        run: cd backend && python build_knowledge_base.py
        env:
          GITHUB_USERNAME: ${{ vars.GITHUB_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          LEETCODE_USERNAME: ${{ vars.LEETCODE_USERNAME }}

      - name: Commit updated knowledge base
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add backend/data/knowledge_base.json
          git diff --cached --quiet || git commit -m "chore: refresh knowledge base"
          git push
